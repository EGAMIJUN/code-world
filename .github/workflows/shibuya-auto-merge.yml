name: Shibuya Auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'feat/shibuya-') || startsWith(github.head_ref, 'fix/shibuya-')
    steps:
      - name: Wait for checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request?.number || context.payload.check_suite?.pull_requests?.[0]?.number
            });
            if (!pr) return;

            // Check: no CodeRabbit Major comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const hasMajor = comments.some(c =>
              c.user.login === 'coderabbitai[bot]' &&
              c.body.includes('Major') &&
              !c.body.includes('No actionable comments')
            );
            if (hasMajor) {
              core.setFailed('CodeRabbit Major issues found - manual review required');
              return;
            }

            // Check: PR body has no unresolved items
            if (pr.body && pr.body.includes('未解決')) {
              core.setFailed('PR has unresolved items');
              return;
            }

            // All good - enable auto-merge
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'merge'
            });
            console.log('Auto-merged successfully');
