name: Shibuya Auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'feat/shibuya-') ||
      startsWith(github.head_ref, 'fix/shibuya-') ||
      startsWith(github.event.check_suite.head_branch, 'feat/shibuya-') ||
      startsWith(github.event.check_suite.head_branch, 'fix/shibuya-')
    steps:
      - name: Enable auto-merge when checks pass
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number ??
                             context.payload.check_suite?.pull_requests?.[0]?.number;
            if (!prNumber) {
              console.log('No pull request found for this event');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Check issue comments for CodeRabbit Major findings
            const { data: issueComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const hasMajorInIssue = issueComments.some(c =>
              c.user?.login === 'coderabbitai[bot]' &&
              c.body?.includes('Major') &&
              !c.body?.includes('No actionable comments')
            );

            // Also check inline review comments for CodeRabbit Major findings
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            const hasMajorInReview = reviewComments.some(c =>
              c.user?.login === 'coderabbitai[bot]' &&
              c.body?.includes('Major') &&
              !c.body?.includes('No actionable comments')
            );

            if (hasMajorInIssue || hasMajorInReview) {
              core.setFailed('CodeRabbit Major issues found - manual review required');
              return;
            }

            // Check PR body for unresolved items
            if (pr.body?.includes('未解決')) {
              core.setFailed('PR has unresolved items');
              return;
            }

            // Enable auto-merge via GraphQL so branch-protection required checks
            // must complete before the actual merge happens
            await github.graphql(`
              mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: $mergeMethod
                }) {
                  pullRequest {
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `, {
              pullRequestId: pr.node_id,
              mergeMethod: 'MERGE'
            });
            console.log(`Auto-merge enabled for PR #${pr.number}`);
