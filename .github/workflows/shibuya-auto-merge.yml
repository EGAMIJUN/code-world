name: Shibuya Auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'feat/shibuya-') ||
      startsWith(github.head_ref, 'fix/shibuya-') ||
      startsWith(github.event.check_suite.head_branch, 'feat/shibuya-') ||
      startsWith(github.event.check_suite.head_branch, 'fix/shibuya-')
    steps:
      - name: Enable auto-merge when checks pass
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number ??
                             context.payload.check_suite?.pull_requests?.[0]?.number;
            if (!prNumber) {
              console.log('No pull request found for this event');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Collect all CodeRabbit comments up front
            const { data: issueComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const crIssue = issueComments.filter(c => c.user?.login === 'coderabbitai[bot]');

            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            const crReview = reviewComments.filter(c => c.user?.login === 'coderabbitai[bot]');

            // Gate 1: CodeRabbit rate-limited → review not complete, hold
            const isRateLimited = crIssue.some(c =>
              c.body?.toLowerCase().includes('review limit reached') ||
              c.body?.toLowerCase().includes('rate limit')
            );
            if (isRateLimited) {
              core.setFailed('CodeRabbit rate limited - review not complete, holding merge');
              return;
            }

            // Gate 2: CodeRabbit review not complete → hold
            // Completion is marked by "Actionable comments posted:" or
            // "No actionable comments" appearing in a summary comment
            const reviewCompleted = crIssue.some(c =>
              c.body?.includes('Actionable comments posted:') ||
              c.body?.includes('No actionable comments')
            );
            if (!reviewCompleted) {
              core.setFailed('CodeRabbit review not complete - waiting');
              return;
            }

            // Gate 3: CodeRabbit Major findings in issue or review comments
            const hasMajorInIssue = crIssue.some(c =>
              c.body?.includes('Major') &&
              !c.body?.includes('No actionable comments')
            );
            const hasMajorInReview = crReview.some(c =>
              c.body?.includes('Major') &&
              !c.body?.includes('No actionable comments')
            );
            if (hasMajorInIssue || hasMajorInReview) {
              core.setFailed('CodeRabbit Major issues found - manual review required');
              return;
            }

            // Gate 4: PR body contains unresolved items marker
            if (pr.body?.includes('未解決')) {
              core.setFailed('PR has unresolved items');
              return;
            }

            // All gates passed — enable auto-merge via GraphQL so branch-protection
            // required checks must still complete before the actual merge happens
            await github.graphql(`
              mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: $mergeMethod
                }) {
                  pullRequest {
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `, {
              pullRequestId: pr.node_id,
              mergeMethod: 'MERGE'
            });
            console.log(`Auto-merge enabled for PR #${pr.number}`);
