name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codeworld
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codeworld
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: ci-dummy-secret-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3001
          NEXT_PUBLIC_API_URL: http://localhost:3001
          GITHUB_CLIENT_ID: dummy
          GITHUB_CLIENT_SECRET: dummy

      - name: Apply DB schema
        working-directory: packages/db
        run: bunx drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codeworld

      - name: Test
        run: bunx turbo run test --filter=@code-world/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codeworld
          BETTER_AUTH_SECRET: ci-dummy-secret-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3001
          NEXT_PUBLIC_API_URL: http://localhost:3001

      # ── Discord notifications ────────────────────────────────────────────────
      # Dynamic values flow through `env:` (never inline ${{ }} in run:) so a
      # crafted commit message / branch name can't be shell-injected. The webhook
      # is a repo secret; notify-discord.sh skips quietly if it isn't configured.
      - name: Notify Discord — CI passed
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTIFY_TITLE: "✅ CI パス: ${{ github.head_ref || github.ref_name }}"
          NOTIFY_DESC: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          NOTIFY_COLOR: "3066993" # green
        run: bash .github/scripts/notify-discord.sh

      - name: Notify Discord — CI failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTIFY_TITLE: "❌ CI 失敗: ${{ github.head_ref || github.ref_name }}"
          NOTIFY_DESC: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          NOTIFY_COLOR: "15158332" # red
        run: bash .github/scripts/notify-discord.sh
