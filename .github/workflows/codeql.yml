name: CodeQL Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 00:00 UTC
    - cron: "0 0 * * 1"

jobs:
  analyze:
    name: Analyze TypeScript
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

      # ── Discord notification ─────────────────────────────────────────────────
      # The detailed alert counts land in the GitHub Security tab; here we just
      # announce whether the scan itself completed or failed.
      - name: Notify Discord — scan complete
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTIFY_TITLE: "🔒 セキュリティスキャン完了: 成功"
          NOTIFY_DESC: "${{ github.head_ref || github.ref_name }} — CodeQL 解析が完了しました（詳細は Security タブ）"
          NOTIFY_COLOR: "3447003" # blue
        run: bash .github/scripts/notify-discord.sh

      - name: Notify Discord — scan failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTIFY_TITLE: "🔒 セキュリティスキャン完了: 失敗"
          NOTIFY_DESC: "${{ github.head_ref || github.ref_name }} — CodeQL 解析が失敗しました"
          NOTIFY_COLOR: "15158332" # red
        run: bash .github/scripts/notify-discord.sh
